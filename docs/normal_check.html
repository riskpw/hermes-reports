<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상태 확인 안내</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --border: #263244;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
    }

    main {
      width: min(680px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #86efac;
      font-weight: 700;
      font-size: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent);
    }

    h1 {
      margin: 20px 0 12px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.8;
    }

    .note {
      margin-top: 20px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.25);
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge"><span class="dot"></span> 상태 확인</div>

    <h1>현재 상태는 정상으로 보입니다.</h1>

    <p>
      다만 정확히 어떤 항목을 확인하는 상황인지 맥락이 부족하므로,
      확답하려면 화면 캡처나 로그, 실행 결과를 한 줄 더 확인하는 것이 좋습니다.
    </p>

    <section>
      <h2>추가로 확인하면 좋은 정보</h2>
      <ul>
        <li>에러 메시지가 있는지</li>
        <li>실행 결과가 예상과 같은지</li>
        <li>Discord 봇 동작이 정상인지</li>
        <li>크론, 리포트, 외부 링크가 정상적으로 열리는지</li>
      </ul>
    </section>

    <div class="note">
      결론: 겉으로 보기에는 정상입니다. 더 정확한 판단은 관련 화면이나 로그를 보면 가능합니다.
    </div>
  </main>
</body>
</html>
